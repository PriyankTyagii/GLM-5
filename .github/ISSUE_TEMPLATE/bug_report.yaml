name: "🐛 Bug Report"
description: Submit a bug report to help us improve the open-source GLM-5
body:
  - type: markdown
    attributes:
      value: |
        ## Before you open an issue

        This repository is for **open-source GLM-5 model** bugs only (weights, inference code, and the examples in this repo).

        If your question is about the **API, coding plans, or official products (ZCode, Z.ai)**, this is **not** the right place. Please use the official channels below so we can help you faster:

        - **API / Coding Plan**: submit a ticket at https://bigmodel.cn/ticket-submit or email service@zhipuai.cn
        - **ZCode**: [Feishu group](https://applink.feishu.cn/client/chat/chatter/add_by_link?link_token=4e4i92a4-c529-4304-a8ad-991a5536bb2a) · [Discord](https://discord.gg/EpH5XkTyhu) · [feedback repo](https://github.com/zai-org/feedback) · email user_feedback@aminer.cn
        - **Z.ai**: https://z.ai/contact
        
        Issues that are unrelated to the open-source model may be closed and redirected to the channels above.

  - type: textarea
    id: system-info
    attributes:
      label: System Info
      description: Your operating environment
      placeholder: Includes Cuda version, Transformers version, Python version, operating system, hardware information (if you suspect a hardware problem)...
    validations:
      required: true

  - type: checkboxes
    id: information-scripts-examples
    attributes:
      label: Information
      description: 'The problem arises when using:'
      options:
        - label: "The official example scripts"
        - label: "My own modified scripts"

  - type: textarea
    id: reproduction
    validations:
      required: true
    attributes:
      label: Reproduction
      description: |
        Please provide a code example that reproduces the problem you encountered, preferably with a minimal reproduction unit.
        If you have code snippets, error messages, stack traces, please provide them here as well.
        Please format your code correctly using code tags. See https://help.github.com/en/github/writing-on-github/creating-and-highlighting-code-blocks#syntax-highlighting
        Do not use screenshots, as they are difficult to read and (more importantly) do not allow others to copy and paste your code.
      placeholder: |
        Steps to reproduce the behavior:

          1.
          2.
          3.

  - type: textarea
    id: expected-behavior
    validations:
      required: true
    attributes:
      label: Expected behavior
      description: "A clear and concise description of what you would expect to happen."
